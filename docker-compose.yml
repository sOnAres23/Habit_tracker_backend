services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${NAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - habits_network
    healthcheck:
      test: ["CMD-SHELL", "-c", "pg_isready -U $USER"]
      interval: 30s
      timeout: 5s
      retries: 5

  habits:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "poetry run python manage.py collectstatic --noinput && poetry run gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/habits
      - static_volume:/habits/staticfiles
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - DATABASE_URL=postgres://${USER}:${PASSWORD}@postgres:${PORT}/${NAME}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=False
      - EMAIL_USE_SSL=True
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      - postgres
      - redis
    networks:
      - habits_network
    env_file:
      - .env

  redis:
    image: redis:latest
    env_file:
      - .env
    networks:
      - habits_network

  celery:
    build: .
    command: poetry run celery -A config worker -l INFO -P eventlet
    volumes:
      - .:/habits
    depends_on:
      - postgres
      - redis
    networks:
      - habits_network
    env_file:
      - .env

  celery-beat:
    build: .
    command: poetry run celery -A config beat -l INFO
    volumes:
      - .:/habits
    depends_on:
      - postgres
      - redis
    networks:
      - habits_network
    env_file:
      - .env

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/nginx/staticfiles
    depends_on:
      - habits
    networks:
      - habits_network

networks:
  habits_network:

volumes:
  postgres_data:
  static_volume:
